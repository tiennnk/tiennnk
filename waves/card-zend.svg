<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Border -->
  <rect x="1" y="1" width="398" height="138" rx="7" ry="7"
        fill="none" stroke="#0C969B" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Title -->
  <text x="16" y="32" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#0C969B">highlands-coffee-clone</text>

  <!-- Description -->
  <text x="16" y="56" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Highlands Coffee clone — Zend MVC, Bootstrap 5</text>
  <text x="16" y="72" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Auth, admin panel, cart &amp; orders, review system, Docker</text>

  <!-- Tech tags -->
  <rect x="16"  y="88" width="36" height="20" rx="10" fill="#777BB4" fill-opacity="0.85"/>
  <text x="34"  y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">PHP</text>

  <rect x="58"  y="88" width="52" height="20" rx="10" fill="#68B604" fill-opacity="0.85"/>
  <text x="84"  y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Zend</text>

  <rect x="116" y="88" width="74" height="20" rx="10" fill="#7952B3" fill-opacity="0.85"/>
  <text x="153" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Bootstrap</text>

  <rect x="196" y="88" width="52" height="20" rx="10" fill="#4479A1" fill-opacity="0.85"/>
  <text x="222" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">MySQL</text>

  <rect x="254" y="88" width="56" height="20" rx="10" fill="#2496ED" fill-opacity="0.85"/>
  <text x="282" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Docker</text>

  <!-- GitHub repo button -->
  <rect x="294" y="111" width="90" height="21" rx="10" fill="#0C969B"/>
  <text x="339" y="125" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">GitHub repo</text>
