<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Border -->
  <rect x="1" y="1" width="398" height="138" rx="7" ry="7"
        fill="none" stroke="#0C969B" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Title -->
  <text x="16" y="32" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#0C969B">devflow-platform</text>

  <!-- Description -->
  <text x="16" y="56" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Real-time task management — NestJS &amp; Next.js</text>
  <text x="16" y="72" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Socket.IO, BullMQ queues, PostgreSQL, Docker CI/CD</text>

  <!-- Tech tags -->
  <rect x="16"  y="88" width="58" height="20" rx="10" fill="#E0234E" fill-opacity="0.85"/>
  <text x="45"  y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">NestJS</text>

  <rect x="80"  y="88" width="64" height="20" rx="10" fill="#555555" fill-opacity="0.85"/>
  <text x="112" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Next.js</text>

  <rect x="150" y="88" width="86" height="20" rx="10" fill="#336791" fill-opacity="0.85"/>
  <text x="193" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">PostgreSQL</text>

  <rect x="242" y="88" width="72" height="20" rx="10" fill="#00BCD4" fill-opacity="0.85"/>
  <text x="278" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Socket.IO</text>

  <rect x="320" y="88" width="58" height="20" rx="10" fill="#2496ED" fill-opacity="0.85"/>
  <text x="349" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Docker</text>

  <!-- GitHub repo button -->
  <rect x="294" y="111" width="90" height="21" rx="10" fill="#0C969B"/>
  <text x="339" y="125" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">GitHub repo</text>
</svg>
