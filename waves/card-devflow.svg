  <!-- Title -->
  <text x="34" y="32" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#0C969B">devflow-platform</text>

  <!-- Description -->
  <text x="16" y="56" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Developer workflow platform — JWT auth, real-time</text>
  <text x="16" y="72" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">WebSocket, BullMQ job queue, AI-powered log analysis</text>

