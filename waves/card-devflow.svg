  <rect x="82"  y="88" width="82" height="20" rx="10" fill="#3178C6" fill-opacity="0.85"/>
  <text x="123" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">TypeScript</text>

  <rect x="170" y="88" width="56" height="20" rx="10" fill="#2496ED" fill-opacity="0.85"/>
  <text x="198" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Docker</text>

  <rect x="232" y="88" width="56" height="20" rx="10" fill="#CC0000" fill-opacity="0.85"/>
  <text x="260" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">BullMQ</text>

