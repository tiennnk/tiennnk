<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Border -->
  <rect x="1" y="1" width="398" height="138" rx="7" ry="7"
        fill="none" stroke="#0C969B" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Title -->
  <text x="16" y="32" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#0C969B">routemesh-service</text>

  <!-- Description -->
  <text x="16" y="56" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">Ride-hailing microservices — NestJS &amp; RabbitMQ</text>
  <text x="16" y="72" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#b8eced">JWT auth, trip lifecycle, PostgreSQL, Docker CI</text>

  <!-- Tech tags -->
  <rect x="16"  y="88" width="58" height="20" rx="10" fill="#E0234E" fill-opacity="0.85"/>
  <text x="45"  y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">NestJS</text>

  <rect x="80"  y="88" width="74" height="20" rx="10" fill="#FF6600" fill-opacity="0.85"/>
  <text x="117" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">RabbitMQ</text>

  <rect x="160" y="88" width="86" height="20" rx="10" fill="#336791" fill-opacity="0.85"/>
  <text x="203" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">PostgreSQL</text>

  <rect x="252" y="88" width="40" height="20" rx="10" fill="#000000" fill-opacity="0.85"/>
  <text x="272" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">JWT</text>

  <rect x="298" y="88" width="56" height="20" rx="10" fill="#2496ED" fill-opacity="0.85"/>
  <text x="326" y="102" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Docker</text>

  <!-- GitHub repo button -->
  <rect x="336" y="112" width="48" height="18" rx="9" fill="#0C969B"/>
  <text x="360" y="124.5" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">Repo</text>
</svg>
