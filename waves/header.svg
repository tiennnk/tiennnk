<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%" height="160" overflow="hidden">
  <defs>
    <style>
      @keyframes wave { from { transform: translateX(0); } to { transform: translateX(-400px); } }
      .w { animation: wave 4s linear infinite; }
    </style>
  </defs>

  <!-- Top + Left + Right as one connected path → clean mitered corners -->
  <path d="M0,142 L0,2 L800,2 L800,142"
        stroke="#0C969B" stroke-width="2" fill="none" stroke-opacity="0.9"
        stroke-linejoin="miter" stroke-linecap="square"/>

  <!-- Bottom wave border (animated) -->
  <g class="w">
    <path d="M0,142 C74,131 126,131 200,142 C274,153 326,153 400,142 C474,131 526,131 600,142 C674,153 726,153 800,142 C874,131 926,131 1000,142 C1074,153 1126,153 1200,142"
          stroke="#0C969B" stroke-width="2" fill="none" stroke-opacity="0.9"/>
    <path d="M0,142 C74,153 126,153 200,142 C274,131 326,131 400,142 C474,153 526,153 600,142 C674,131 726,131 800,142 C874,153 926,153 1000,142 C1074,131 1126,131 1200,142"
          stroke="#0C969B" stroke-width="1.5" fill="none" stroke-opacity="0.45"/>
  </g>

  <!-- Title -->
  <text x="400" y="80" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="700"
        fill="#0C969B" text-anchor="middle" letter-spacing="1">Tien Nguyen</text>
  <!-- Subtitle -->
  <text x="400" y="104" font-family="Arial,Helvetica,sans-serif" font-size="16"
        fill="#b8eced" text-anchor="middle">willbe</text>
</svg>
