name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ngtn-tiennguyen
          SETTING_JSON: |
            {
              "githubUserName": "ngtn-tiennguyen",
              "backgroundColor": "#0d1117"
            }

      - name: Replace green with teal
        run: |
          for f in profile-3d-contrib/profile-night-green.svg profile-3d-contrib/profile-green.svg; do
            if [ -f "$f" ]; then
              sed -i \
                -e 's/#47a042/#0C969B/g' \
                -e 's/rgb(87, 218, 105)/rgb(12, 150, 155)/g' \
                -e 's/rgb(73, 182, 88)/rgb(10, 125, 129)/g' \
                -e 's/rgb(61, 153, 74)/rgb(8, 105, 109)/g' \
                -e 's/rgb(45, 209, 67)/rgb(11, 144, 149)/g' \
                -e 's/rgb(38, 175, 56)/rgb(10, 121, 125)/g' \
                -e 's/rgb(36, 167, 54)/rgb(9, 115, 119)/g' \
                -e 's/rgb(31, 146, 47)/rgb(8, 101, 104)/g' \
                -e 's/rgb(30, 140, 45)/rgb(8, 96, 99)/g' \
                -e 's/rgb(27, 125, 40)/rgb(7, 86, 89)/g' \
                -e 's/rgb(25, 117, 38)/rgb(6, 81, 83)/g' \
                -e 's/rgb(23, 105, 33)/rgb(6, 72, 74)/g' \
                -e 's/rgb(19, 88, 28)/rgb(5, 61, 63)/g' \
                "$f"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git diff --cached --quiet || git commit -m "update: 3d contribution calendar"
          git push
