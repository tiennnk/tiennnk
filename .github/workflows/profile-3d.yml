name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ngtn-tiennguyen
          SETTING_JSON: |
            {
              "githubUserName": "ngtn-tiennguyen",
              "backgroundColor": "#161b22"
            }

      - name: Replace green with teal
        run: |
          python3 - <<'EOF'
          import os

          replacements = [
              ("rgb(87, 218, 105)", "rgb(12, 150, 155)"),
              ("rgb(73, 182, 88)",  "rgb(10, 125, 129)"),
              ("rgb(61, 153, 74)",  "rgb(8, 105, 109)"),
              ("rgb(45, 209, 67)",  "rgb(11, 144, 149)"),
              ("rgb(38, 175, 56)",  "rgb(10, 121, 125)"),
              ("rgb(36, 167, 54)",  "rgb(9, 115, 119)"),
              ("rgb(31, 146, 47)",  "rgb(8, 101, 104)"),
              ("rgb(30, 140, 45)",  "rgb(8, 96, 99)"),
              ("rgb(27, 125, 40)",  "rgb(7, 86, 89)"),
              ("rgb(25, 117, 38)",  "rgb(6, 81, 83)"),
              ("rgb(23, 105, 33)",  "rgb(6, 72, 74)"),
              ("rgb(19, 88, 28)",   "rgb(5, 61, 63)"),
              ("#47a042",           "#0C969B"),
              ("#00000f",           "none"),
              ("#161b22",           "none"),
              ("#ffffff",           "none"),
              ("#eeeeff",           "#0C969B"),
          ]

          targets = [
              "profile-3d-contrib/profile-night-green.svg",
              "profile-3d-contrib/profile-green.svg",
          ]

          for path in targets:
              if not os.path.exists(path):
                  continue
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              for old, new in replacements:
                  content = content.replace(old, new)
              # Fix invisible text in light theme: text fill="none" → teal
              import re
              if "profile-green" in path:
                  content = re.sub(r'(<text\b[^>]*?)fill="none"([^>]*>)', r'\1fill="#0C969B"\2', content)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"Replaced colors in {path}")
          EOF

      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git diff --cached --quiet || git commit -m "update: 3d contribution calendar"
          git push
