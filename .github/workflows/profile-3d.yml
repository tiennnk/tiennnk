name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ngtn-tiennguyen
          SETTING_JSON: |
            {
              "githubUserName": "ngtn-tiennguyen",
              "backgroundColor": "#0d1117"
            }

      - name: Replace green with teal
        run: |
          for f in profile-3d-contrib/profile-night-green.svg profile-3d-contrib/profile-green.svg; do
            if [ -f "$f" ]; then
              sed -i \
                -e 's/#39d353/#0C969B/g' \
                -e 's/#26a641/#0A7A7F/g' \
                -e 's/#006d32/#085E62/g' \
                -e 's/#0e4429/#064e52/g' \
                -e 's/#00ff7f/#0C969B/g' \
                -e 's/#1a7f25/#0A7A7F/g' \
                "$f"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git diff --cached --quiet || git commit -m "update: 3d contribution calendar"
          git push
